name: CI/CD Pipeline
run-name: ${{ github.actor }} is testing
on: [push]
jobs:

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Show directory
        run: pwd

      - name: Show in
        run: ls -la

      - name: Build with Maven
        run: mvn clean package

      - name: Where I am
        run: dir

      - name: Build docker image
        run: docker build -t mydigitalmaster .

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN}}

      - name: Give name of image
        run: docker tag my-app-image dezenfection/mydigitalmaster

      - name: Push docker image in Docker Hub
        run: docker push dezenfection/mydigitalmaster

      - name: Deploy over SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            cd /home/user1/app || exit
            docker pull dezenfection/mydigitalmaster
            
            


